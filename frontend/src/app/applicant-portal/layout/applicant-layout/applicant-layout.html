<div class="min-h-screen bg-slate-50 font-sans flex flex-col">
  <!-- HEADER – ẩn khi là forgot-password HR để full màn hình như /hr/login -->
  @if (!isHrForgotPassword) {
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm px-8 h-16 flex justify-between items-center">
      <div class="flex items-center gap-3 cursor-pointer" routerLink="/careers">
        <img src="logo-hr-portal.svg" alt="HR Portal" class="w-9 h-9 drop-shadow-sm">
        <div class="flex flex-col leading-tight">
          <span class="text-sm font-black uppercase tracking-tighter text-slate-900">Recruitment</span>
          <span class="text-[10px] text-blue-500 font-bold uppercase">Online Portal</span>
        </div>
      </div>

      <div class="flex items-center gap-4">
        @if (isLoggedIn()) {
          <div class="user-dropdown-wrapper relative">
            <button (click)="toggleDropdown()" class="flex items-center gap-2.5 px-3 py-2 text-slate-700 hover:bg-slate-50 rounded-xl transition-all cursor-pointer">
              <img [src]="'https://api.dicebear.com/9.x/avataaars/svg?seed=' + userName()" class="w-7 h-7 rounded-full shrink-0 object-cover" alt="avatar" />
              <span class="text-sm font-semibold text-slate-700 hidden sm:block">{{ userName() }}</span>
              <svg class="w-4 h-4 text-slate-400 transition-transform" [class.rotate-180]="isDropdownOpen()" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
              </svg>
            </button>

            @if (isDropdownOpen()) {
              <div class="absolute right-0 mt-2 w-56 bg-white border border-slate-200 rounded-2xl shadow-xl py-1.5 z-50">
                <a routerLink="/applicant" (click)="isDropdownOpen.set(false)" class="flex items-center gap-3 px-4 py-2.5 text-sm font-normal text-slate-700 hover:bg-slate-50 mx-1 rounded-xl">
                  <svg class="w-4 h-4 text-slate-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                  </svg>
                  Dashboard
                </a>
                <a routerLink="/profile" (click)="isDropdownOpen.set(false)" class="flex items-center gap-3 px-4 py-2.5 text-sm font-normal text-slate-700 hover:bg-slate-50 mx-1 rounded-xl">
                  <svg class="w-4 h-4 text-slate-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                  </svg>
                  Profile
                </a>
                <div class="border-t border-slate-100 my-1.5 mx-3"></div>
                <a (click)="logout()" class="flex items-center gap-3 px-4 py-2.5 text-sm font-normal text-red-600 hover:bg-red-50 mx-1 rounded-xl cursor-pointer">
                  <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                  </svg>
                  Sign Out
                </a>
              </div>
            }
          </div>
        } @else {
          <!-- KHI ĐANG Ở TRANG AUTH → NÚT BACK TO CAREERS; CÒN LẠI → NÚT SIGN IN -->
          @if (isAuthPage) {
            <a routerLink="/careers" class="inline-flex items-center gap-1.5 text-[13px] font-medium text-blue-600 hover:text-blue-700 transition-colors no-underline">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>
              </svg>
              Back to Careers
            </a>
          } @else {
            <button routerLink="/login" class="px-6 py-2 bg-slate-900 text-white text-xs font-black rounded-xl hover:bg-blue-600 transition-all shadow-md uppercase italic tracking-widest cursor-pointer">
              Sign In
            </button>
          }
        }
      </div>
    </header>
  }

  <main class="flex-grow relative">
    <router-outlet></router-outlet>
  </main>
</div>
