<div style="display: flex; flex-wrap: wrap; gap: 24px;">

  <div style="flex: 1; min-width: 400px; padding: 24px; border: 1px solid #e5e7eb; border-radius: 8px; background: #fff;">
    <h3 style="margin-top: 0; font-weight: bold;">Personal Details</h3>
    <p style="color: #6b7280; font-size: 14px; margin-bottom: 24px;">
      These details are shown in the HR portal.
    </p>

    <form [formGroup]="profileForm" (ngSubmit)="onSaveDetails()">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px;">

        <div style="grid-column: span 2;">
          <label style="display: block; font-weight: 500; margin-bottom: 6px;">Full Name</label>
          <input type="text" formControlName="fullName" style="width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px;">
        </div>

        <div>
          <label style="display: block; font-weight: 500; margin-bottom: 6px;">Email</label>
          <input type="email" formControlName="email" style="width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px;">
        </div>

        <div>
          <label style="display: block; font-weight: 500; margin-bottom: 6px;">Role</label>
          <input type="text" formControlName="role" style="width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; background: #f3f4f6;">
        </div>

        <div>
          <label style="display: block; font-weight: 500; margin-bottom: 6px;">Employee ID</label>
          <input type="text" formControlName="employeeId" style="width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; background: #f3f4f6;">
        </div>

        <div>
          <label style="display: block; font-weight: 500; margin-bottom: 6px;">Applicant ID</label>
          <input type="text" formControlName="applicantId" style="width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; background: #f3f4f6;">
        </div>

      </div>

      <div style="text-align: right;">
        <button type="submit" style="background: #111827; color: white; padding: 10px 20px; border-radius: 6px; border: none; font-weight: 500; cursor: pointer;">
          Save Details
        </button>
      </div>
    </form>
  </div>


  <div style="flex: 1; min-width: 400px; padding: 24px; border: 1px solid #e5e7eb; border-radius: 8px; background: #fff;">
    <h3 style="margin-top: 0; font-weight: bold;">Change Password</h3>
    <p style="color: #6b7280; font-size: 14px; margin-bottom: 24px;">
      Update your password to keep your account secure.
    </p>

    <form [formGroup]="passwordForm" (ngSubmit)="onUpdatePassword()">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px;">

        <div style="grid-column: span 2;">
          <label style="display: block; font-weight: 500; margin-bottom: 6px;">Current Password</label>
          <input type="password" formControlName="currentPassword" style="width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px;">
        </div>

        <div>
          <label style="display: block; font-weight: 500; margin-bottom: 6px;">New Password</label>
          <input type="password" formControlName="newPassword" style="width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px;">
        </div>

        <div>
          <label style="display: block; font-weight: 500; margin-bottom: 6px;">Confirm Password</label>
          <input type="password" formControlName="confirmPassword" style="width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px;">
        </div>

      </div>

      <div style="text-align: right;">
        <button type="submit" style="background: #111827; color: white; padding: 10px 20px; border-radius: 6px; border: none; font-weight: 500; cursor: pointer;">
          Update Password
        </button>
      </div>
    </form>
  </div>

</div>
