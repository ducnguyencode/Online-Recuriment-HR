<div class="min-h-screen bg-slate-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8 font-sans">
  <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
    <img src="logo-hr-portal.svg" alt="HR Portal" class="w-16 h-16 mx-auto mb-4 drop-shadow-md">
    <h2 class="text-3xl font-extrabold text-slate-900">Reset Password</h2>
    <p class="mt-2 text-sm text-slate-500 font-medium">Enter your email to receive a reset link</p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-8 shadow-xl shadow-slate-200/50 rounded-[24px] border border-slate-200">
      <form class="space-y-5" (ngSubmit)="onSubmit()">
        <div>
          <label class="block text-[11px] font-bold text-slate-700 uppercase tracking-widest mb-2 ml-1">Email Address</label>
          <input type="email" [(ngModel)]="email" name="email" required class="w-full px-4 py-3.5 rounded-xl border border-slate-200 bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none transition-all text-sm font-medium" placeholder="applicant@example.com">
        </div>
        <div>
          <button type="submit" [disabled]="isLoading()" class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-md text-sm font-bold text-white bg-slate-900 hover:bg-blue-600 focus:outline-none transition-all disabled:opacity-50">
            {{ isLoading() ? 'Sending...' : 'Send Reset Link' }}
          </button>
        </div>
      </form>
      <div class="mt-8 text-center"><p class="text-sm font-medium text-slate-500">Remember your password? <a routerLink="/login" class="font-bold text-blue-600 hover:text-blue-500 transition-colors">Sign in</a></p></div>
    </div>
  </div>
</div>
