<div class="min-h-screen bg-slate-50 flex items-center justify-center py-12 px-4 font-sans">
  <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-[32px] shadow-sm border border-slate-100">
    <div class="text-center">
      <h2 class="text-3xl font-extrabold text-slate-900">Reset <span class="text-blue-600">Password</span></h2>
      <p class="mt-2 text-sm text-slate-500 font-medium">Enter your email to receive a reset link.</p>
    </div>

    @if (!isSent) {
      <form class="mt-8 space-y-6" (ngSubmit)="sendResetLink()">
        <div>
          <label class="block text-[11px] font-bold text-slate-700 uppercase tracking-widest mb-2 ml-1">Email Address</label>
          <input type="email" [(ngModel)]="email" name="email" required
            class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none transition-all" placeholder="name@company.com">
        </div>

        <button type="submit" [disabled]="isLoading"
          class="w-full py-4 bg-slate-900 hover:bg-blue-600 text-white font-bold rounded-2xl shadow-lg transition-all duration-300">
          {{ isLoading ? 'Sending...' : 'Send Reset Link' }}
        </button>

        <div class="text-center">
          <a routerLink="/login" class="text-sm font-bold text-blue-600 hover:text-blue-700 transition">Back to Login</a>
        </div>
      </form>
    } @else {
      <div class="text-center py-8 space-y-4">
        <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
          <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <h3 class="text-xl font-bold text-slate-900">Email Sent!</h3>
        <p class="text-slate-500 text-sm">Please check your inbox for further instructions.</p>
        <button routerLink="/login" class="w-full py-4 bg-slate-100 text-slate-900 font-bold rounded-2xl hover:bg-slate-200 transition-all">
          Return to Login
        </button>
      </div>
    }
  </div>
</div>
