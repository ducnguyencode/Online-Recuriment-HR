<div
  class="min-h-[calc(100vh-64px)] bg-slate-50 flex items-center justify-center p-4 py-12 animate-in fade-in duration-500"
>
  <div
    class="w-full max-w-md bg-white border border-slate-200 rounded-[24px] p-8 shadow-xl shadow-slate-200/50"
  >
    <div class="text-center mb-4">
      <div
        class="inline-flex items-center justify-center w-12 h-12 bg-blue-500 text-white font-black text-xl rounded-2xl shadow-sm mb-4"
      >
        HR
      </div>
      <h2 class="text-2xl font-bold text-slate-900 tracking-tight">
        {{ title() }}
      </h2>
      <p class="text-sm text-slate-500 mt-2">Verify your email</p>
    </div>

    <div class="space-y-4 text-center">
      <div class="mb-4">
        {{ description() }}
      </div>

      @if (needsInitialPassword()) {
        <div class="text-left">
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2"
            >Initial password</label
          >
          <input
            type="password"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            placeholder="Enter your password"
            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-slate-50/50 hover:bg-slate-50 outline-none transition text-sm font-medium"
          />
          @if (formError()) {
            <div class="text-red-600 text-sm mt-2">{{ formError() }}</div>
          }
        </div>
        <button
          class="w-full py-3.5 mt-2 bg-slate-900 hover:bg-blue-500 text-white text-sm font-bold rounded-xl transition-colors shadow-md hover:shadow-lg"
          [disabled]="submitting()"
          (click)="submitInitialPassword()"
        >
          {{ submitting() ? "Saving..." : "Set initial password" }}
        </button>
      }

      <button
        class="w-full py-3.5 mt-2 bg-slate-900 hover:bg-blue-500 text-white text-sm font-bold rounded-xl transition-colors shadow-md hover:shadow-lg"
        (click)="returnLogin()"
      >
        Return to login
      </button>
    </div>
  </div>
</div>
