<div class="min-h-screen bg-slate-50 font-sans flex flex-col">
  <header class="h-16 bg-white border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-full flex items-center justify-between">

      <div class="flex items-center gap-2 cursor-pointer" routerLink="/">
        <div class="w-8 h-8 bg-blue-500 text-white flex items-center justify-center font-bold rounded-xl shadow-sm">HR</div>
        <span class="text-lg font-bold text-slate-900 tracking-tight">Recruitment</span>
      </div>

      <nav class="hidden md:flex items-center gap-8">
        <a routerLink="/careers" routerLinkActive="text-blue-500 font-bold" class="text-sm font-medium text-slate-600 hover:text-blue-500 transition">Careers</a>
        <a routerLink="/applicant" routerLinkActive="text-blue-500 font-bold" class="text-sm font-medium text-slate-600 hover:text-blue-500 transition">My Dashboard</a>
      </nav>

      <div class="flex items-center gap-3">
        @if (!isLogin) {
          <span class="hidden sm:inline text-xs font-semibold text-slate-400 uppercase tracking-wider mr-2">For Applicants</span>
          <button routerLink="/login" class="px-5 py-2 bg-slate-900 text-white text-sm font-bold rounded-2xl hover:bg-blue-500 transition shadow-sm">
            Sign In
          </button>
        } @else {
          <div class="flex items-center gap-3 p-1 pr-3 border border-slate-200 rounded-2xl bg-slate-50/50">
            <div class="w-8 h-8 bg-blue-100 text-blue-500 flex items-center justify-center font-bold rounded-xl text-sm border border-blue-200">
              {{ mockUser.fullName.charAt(0) || 'K' }}
            </div>
            <div class="hidden sm:flex flex-col">
              <span class="text-[12px] font-bold text-slate-900 leading-none">Khang (Dev 5)</span>
              <span class="text-[10px] text-slate-400 font-medium">Applicant</span>
            </div>
            <button (click)="logout()" class="ml-2 p-1.5 text-slate-400 hover:text-red-500 transition rounded-lg hover:bg-red-50" title="Logout">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
            </button>
          </div>
        }
      </div>
    </div>
  </header>

  <main class="flex-1">
    <router-outlet />
  </main>

  <footer class="py-6 border-t border-slate-200 bg-white text-center">
    <p class="text-xs text-slate-400">© 2026 Dev 5 – Khang. Online Recruitment System.</p>
  </footer>
</div>
