<nav class="bg-white border-b border-slate-100 sticky top-0 z-50 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">

      <div class="flex items-center gap-2 cursor-pointer" routerLink="/">
        <div class="w-8 h-8 bg-blue-600 text-white flex items-center justify-center font-bold rounded-xl shadow-sm">HR</div>
        <span class="text-lg font-bold text-slate-900 tracking-tight">Recruitment</span>
      </div>

      <div class="hidden md:flex items-center gap-8">
        <a routerLink="/careers" routerLinkActive="text-blue-600 font-bold" class="text-sm font-medium text-slate-600 hover:text-blue-500 transition-colors">Careers</a>
        <a routerLink="/applicant" routerLinkActive="text-blue-600 font-bold" class="text-sm font-medium text-slate-600 hover:text-blue-500 transition-colors">My Dashboard</a>
      </div>

      <div class="flex items-center gap-4">

        @if (!isLoggedIn) {
          <button routerLink="/login" class="px-6 py-2 bg-slate-900 text-white text-sm font-bold rounded-xl hover:bg-blue-600 transition-all shadow-md">
            Login
          </button>
        }

        @else {
          <div class="flex items-center gap-3 p-1.5 pr-4 border border-slate-200 rounded-2xl bg-slate-50/50">
            <div class="w-8 h-8 bg-blue-100 text-blue-600 flex items-center justify-center font-bold rounded-xl text-xs border border-blue-200 uppercase">
              {{ (userFullName || 'U').charAt(0) }}
            </div>
            <div class="hidden sm:flex flex-col">
              <span class="text-[11px] font-bold text-slate-900 leading-none">{{ userFullName }}</span>
              <span class="text-[10px] text-slate-400 font-medium uppercase tracking-widest mt-0.5">Applicant</span>
            </div>
            <button (click)="onLogout()" class="ml-2 p-1.5 text-slate-400 hover:text-red-500 transition-colors" title="Logout">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </button>
          </div>
        }
      </div>

    </div>
  </div>
</nav>

<main class="min-h-screen bg-slate-50/30">
  <router-outlet></router-outlet>
</main>
