<div class="max-w-4xl mx-auto p-4 py-8 animate-in fade-in duration-500">
  <div class="bg-white border border-slate-200 rounded-[24px] p-8 shadow-sm">

    <div class="flex items-center justify-between mb-8 pb-6 border-b border-slate-100">
      <div>
        <h2 class="text-2xl font-bold text-slate-900">Edit Profile</h2>
        <p class="text-sm text-slate-500 mt-1">Update your personal information and resume details.</p>
      </div>
      <div class="h-16 w-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-xl font-bold uppercase shadow-inner">
        {{ candidate.fullName ? candidate.fullName.charAt(0) : 'U' }}
      </div>
    </div>

    @if (successMessage) {
      <div class="mb-6 p-4 bg-green-50 border border-green-100 text-green-700 rounded-xl text-sm font-bold flex items-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        {{ successMessage }}
      </div>
    }

    <form (ngSubmit)="onUpdate()" class="space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-[11px] font-bold text-slate-700 uppercase tracking-widest mb-2 ml-1">Full Name</label>
          <input type="text" [(ngModel)]="candidate.fullName" name="fullName"
            class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none transition-all font-medium">
        </div>
        <div>
          <label class="block text-[11px] font-bold text-slate-700 uppercase tracking-widest mb-2 ml-1">Job Title</label>
          <input type="text" [(ngModel)]="candidate.title" name="title" placeholder="e.g. Frontend Developer"
            class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none transition-all font-medium">
        </div>
        <div>
          <label class="block text-[11px] font-bold text-slate-700 uppercase tracking-widest mb-2 ml-1">Email Address</label>
          <input type="email" [(ngModel)]="candidate.email" name="email" readonly
            class="w-full px-5 py-4 rounded-2xl border border-slate-100 bg-slate-50 text-slate-400 cursor-not-allowed outline-none font-medium">
        </div>
        <div>
          <label class="block text-[11px] font-bold text-slate-700 uppercase tracking-widest mb-2 ml-1">Phone Number</label>
          <input type="text" [(ngModel)]="candidate.phone" name="phone"
            class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none transition-all font-medium">
        </div>
      </div>

      <div class="mt-10 pt-8 border-t border-slate-100">
        <h3 class="text-xl font-bold text-slate-900 mb-6 flex items-center gap-2">
          <svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
          Security Settings
        </h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-[11px] font-bold text-slate-700 uppercase tracking-widest mb-2 ml-1">New Password</label>
            <input type="password" class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none transition-all" placeholder="••••••••">
          </div>
          <div>
            <label class="block text-[11px] font-bold text-slate-700 uppercase tracking-widest mb-2 ml-1">Confirm Password</label>
            <input type="password" class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none transition-all" placeholder="••••••••">
          </div>
        </div>
      </div>

      <div class="flex justify-end pt-6">
        <button type="submit" class="px-8 py-4 bg-slate-900 hover:bg-blue-600 text-white text-sm font-bold rounded-2xl transition-all shadow-lg shadow-slate-900/10">
          Save Profile & Security
        </button>
      </div>
    </form>
  </div>
</div>
