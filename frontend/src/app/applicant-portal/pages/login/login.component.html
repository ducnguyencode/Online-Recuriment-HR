<div class="min-h-[calc(100vh-64px)] bg-slate-50 flex items-center justify-center p-4 py-12">
  <div class="w-full max-w-md bg-white border border-slate-200 rounded-[24px] p-8 shadow-xl shadow-slate-200/50">

    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-12 h-12 bg-blue-500 text-white font-black text-xl rounded-2xl shadow-sm mb-4">
        HR
      </div>
      <h2 class="text-2xl font-bold text-slate-900 tracking-tight">
        {{ selectedRole === UserRoleLogin.APPLICANT ? 'Applicant Login' : 'HR Portal Access' }}
      </h2>
      <p class="text-sm text-slate-500 mt-2">
        Enter your details to access your account.
      </p>
    </div>

    @if (formError) {
      <div class="mb-6 p-4 bg-red-50 border border-red-100 text-red-600 rounded-xl text-sm font-bold text-center">
        {{ formError }}
      </div>
    }

    <div class="space-y-4">
      <div>
        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Email Address</label>
        <input type="email" [(ngModel)]="form.email" placeholder="you@example.com"
          class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-slate-50/50 hover:bg-slate-50 outline-none transition text-sm font-medium" />
      </div>

      <div>
        <div class="flex items-center justify-between mb-2">
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider">Password</label>
          <a routerLink="/forgot-password" class="text-xs font-bold text-blue-500 hover:text-blue-700 transition">Forgot?</a>
        </div>
        <input type="password" [(ngModel)]="form.password" placeholder="••••••••"
          class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-slate-50/50 hover:bg-slate-50 outline-none transition text-sm font-medium" />
      </div>

      <button (click)="submit()" [disabled]="isLoading"
        class="w-full py-3.5 mt-2 bg-slate-900 hover:bg-blue-500 text-white text-sm font-bold rounded-xl transition-colors shadow-md hover:shadow-lg disabled:opacity-50">
        {{ isLoading ? 'Signing in...' : 'Sign In' }}
      </button>
    </div>

    @if (selectedRole === UserRoleLogin.APPLICANT) {
      <div class="mt-8 text-center text-sm font-medium text-slate-500">
        Don't have an account?
        <a routerLink="/register" class="text-blue-600 font-bold hover:underline">Sign up now</a>
      </div>
    }
  </div>
</div>
