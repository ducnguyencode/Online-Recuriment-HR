<div class="min-h-screen bg-slate-50 flex items-center justify-center p-4 font-sans relative overflow-hidden">

  <div class="absolute top-[-10%] left-[-5%] w-96 h-96 bg-blue-200 rounded-full mix-blend-multiply filter blur-3xl opacity-40"></div>
  <div class="absolute bottom-[-10%] right-[-5%] w-96 h-96 bg-indigo-200 rounded-full mix-blend-multiply filter blur-3xl opacity-40"></div>

  <div class="w-full max-w-md bg-white rounded-[32px] shadow-2xl shadow-slate-200/50 border border-slate-100 p-10 relative z-10 animate-in slide-in-from-bottom-4 fade-in duration-500">

    <div class="flex flex-col items-center mb-8">
      <div class="w-14 h-14 bg-gradient-to-br from-blue-500 to-blue-700 text-white flex items-center justify-center font-bold text-2xl rounded-2xl shadow-lg shadow-blue-200 mb-5">
        HR
      </div>
      <h2 class="text-[28px] font-extrabold text-slate-900 tracking-tight leading-tight">HR Workspace</h2>
      <p class="text-sm text-slate-500 font-medium mt-1">Authorized personnel only</p>
    </div>

    <form class="space-y-4">

      <div>
        <label class="block text-[11px] font-bold text-slate-700 uppercase tracking-widest mb-2 ml-1">Work Email</label>
        <input type="email" class="w-full px-5 py-4 rounded-2xl border border-slate-200 hover:border-slate-300 bg-slate-50/50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-sm font-medium placeholder:text-slate-400" placeholder="hr@company.com">
      </div>

      <div>
        <div class="flex justify-between items-center mb-2 ml-1 pr-1">
          <label class="block text-[11px] font-bold text-slate-700 uppercase tracking-widest">Password</label>
          <a href="#" class="text-[11px] font-bold text-blue-600 hover:text-blue-700 transition-colors">Forgot?</a>
        </div>
        <input type="password" class="w-full px-5 py-4 rounded-2xl border border-slate-200 hover:border-slate-300 bg-slate-50/50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-sm font-medium placeholder:text-slate-400" placeholder="••••••••">
      </div>

      <button type="button" (click)="onSubmit()" class="w-full mt-6 py-4 px-8 border border-transparent rounded-2xl shadow-lg shadow-slate-900/10 text-sm font-bold text-white bg-slate-900 hover:bg-blue-600 transition-all duration-300">
        Access Portal
      </button>

    </form>

    <div class="mt-8 pt-6 border-t border-slate-100 text-center">
      <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">RecruitHub Internal System</p>
    </div>

  </div>
</div>
