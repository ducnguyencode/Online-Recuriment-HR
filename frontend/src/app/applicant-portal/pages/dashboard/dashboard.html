<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 font-sans">

  <div class="mb-10">
    <h1 class="text-[28px] font-bold text-slate-900 tracking-tight">Applicant Dashboard</h1>
    <p class="text-slate-500 font-medium mt-1">Welcome back, Khang. Here is an overview of your applications.</p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-1 gap-8">

    <div class="lg:col-span-2 space-y-6">
      <div class="bg-white border border-slate-200 rounded-[24px] overflow-hidden shadow-sm">
        <div class="px-6 py-5 border-b border-slate-100 flex items-center justify-between bg-white">
          <h3 class="font-bold text-slate-800 flex items-center gap-2">
            <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 12h6m-6 4h6m2 5H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5.586a1 1 0 0 1 .707.293l5.414 5.414a1 1 0 0 1 .293.707V19a2 2 0 0 1-2 2z">
              </path>
            </svg>
            Submitted Applications
          </h3>
          <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">{{ applications().length }}
            Total</span>
        </div>

        <div class="p-3">
          @for (app of applications(); track app) {
          <div class="flex items-center justify-between p-4 rounded-2xl hover:bg-slate-50 transition-colors group">
            <div class="flex items-center gap-4">
              <div
                class="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center text-slate-400 group-hover:bg-blue-50 group-hover:text-blue-500 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                  </path>
                </svg>
              </div>
              <div>
                <p class="font-bold text-slate-900 group-hover:text-blue-600 transition-colors">{{ app.vacancy?.title }}
                </p>
                <p class="text-xs text-slate-400 font-medium mt-0.5">Applied on: {{ app.createdAt | date: 'MM/dd/yyyy'
                  }}
                </p>
              </div>
            </div>
            <span class="px-3 py-1.5 text-[11px] font-bold rounded-lg {{getStatusClass(app.status) }}">
              {{ app.status }}
            </span>
          </div>
          }
        </div>
      </div>
    </div>
  </div>
</div>
