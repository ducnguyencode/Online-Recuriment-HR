<div class="max-w-4xl mx-auto px-4 py-10">
  <div class="bg-white border border-slate-200 rounded-[32px] p-8 shadow-sm">
    <div class="mb-8 text-center">
      <h1 class="text-3xl font-extrabold text-slate-900">Edit <span class="text-blue-600">Profile</span></h1>
    </div>

    @if (successMessage) {
      <div class="mb-6 p-4 bg-green-50 text-green-600 rounded-2xl border border-green-100 font-bold">
        {{ successMessage }}
      </div>
    }

    <form (ngSubmit)="onUpdateProfile()" class="grid grid-cols-2 gap-6">
      <div class="col-span-2 sm:col-span-1">
        <label class="block text-[11px] font-bold text-slate-700 uppercase mb-2">Full Name</label>
        <input type="text" [(ngModel)]="candidate.fullName" name="fullName" class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50/50 focus:bg-white outline-none transition-all">
      </div>
      <div class="col-span-2 sm:col-span-1">
        <label class="block text-[11px] font-bold text-slate-700 uppercase mb-2">Email</label>
        <input type="email" [(ngModel)]="candidate.email" name="email" class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-100 text-slate-400" readonly>
      </div>
      <button type="submit" class="col-span-2 py-4 bg-slate-900 hover:bg-blue-600 text-white font-bold rounded-2xl transition-colors">
        Save Changes
      </button>
    </form>
  </div>
</div>
