<div class="min-h-screen bg-slate-50 flex items-center justify-center py-12 px-4 font-sans">
  <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-[32px] shadow-sm border border-slate-100">
    <div class="text-center">
      <h2 class="text-3xl font-extrabold text-slate-900">
        Email <span class="text-blue-600">Verification</span>
      </h2>
      <p class="mt-2 text-sm text-slate-500 font-medium">
        Confirm your account to continue.
      </p>
    </div>

    @if (isVerifying()) {
      <div class="text-center py-8 space-y-4">
        <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 animate-pulse">
          <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3"></path>
            <circle cx="12" cy="12" r="9"></circle>
          </svg>
        </div>
        <h3 class="text-xl font-bold text-slate-900">{{ title() }}</h3>
        <p class="text-slate-500 text-sm">{{ description() }}</p>
      </div>
    } @else {
      <div class="text-center py-2 space-y-4">
        <div
          class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"
          [class]="isSuccess() ? 'bg-green-100 text-green-600' : 'bg-amber-100 text-amber-600'"
        >
          <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            @if (isSuccess()) {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            } @else {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v4m0 4h.01"></path>
              <circle cx="12" cy="12" r="9"></circle>
            }
          </svg>
        </div>

        <h3 class="text-xl font-bold text-slate-900">{{ title() }}</h3>
        <p class="text-slate-500 text-sm">{{ description() }}</p>

        @if (verifiedEmail(); as email) {
          <p class="text-xs text-slate-500">Account: <strong>{{ email }}</strong></p>
        }

        <button
          type="button"
          class="w-full py-4 bg-slate-900 hover:bg-blue-600 text-white font-bold rounded-2xl shadow-lg transition-all duration-300"
          (click)="handlePrimaryAction()"
        >
          {{ actionLabel() }}
        </button>
      </div>
    }
  </div>
</div>
