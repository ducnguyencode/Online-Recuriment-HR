<div class="page-container">
    <div class="page-header">
        <div>
            <h1 class="page-title">My Availability</h1>
            <p class="page-subtitle">Register your free time slots for interviews</p>
        </div>
    </div>
    <!-- @if (auth.isInterviewer()) { -->
    <div class="card" style="padding: 20px; max-width: 500px; margin-bottom: 20px;">
        <h3>Add Free Slot</h3>
        <div class="form-group">
            <label class="form-label">Date</label>
            <input type="date" class="form-input" [(ngModel)]="newSlot.availableDate">
        </div>
        <div class="form-row">
            <div class="form-group" style="flex: 1">
                <label class="form-label">Start Time</label>
                <input type="time" class="form-input" [(ngModel)]="newSlot.startTime">
            </div>
            <div class="form-group" style="flex: 1">
                <label class="form-label">End Time</label>
                <input type="time" class="form-input" [(ngModel)]="newSlot.endTime">
            </div>
        </div>
        <button class="btn-primary" (click)="saveSlot()">Add Availability</button>
        @if(errorMsg) { <p style="color: red; margin-top: 10px;">{{ errorMsg }}</p> }
    </div>
    <!-- } @else {
    <div class="alert alert-warning" style="margin-bottom: 20px;">
        <strong>Notice:</strong> Only Interviewers are allowed to register availability slots.
    </div>
    } -->

    <div class="card">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Start Time</th>
                    <th>End Time</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                @for(slot of mySlots(); track slot.id) {
                <tr>
                    <td>{{ slot.availableDate }}</td>
                    <td>{{ slot.startTime }}</td>
                    <td>{{ slot.endTime }}</td>
                    <td>
                        <button class="btn-danger btn-sm" (click)="deleteSlot(slot.id)">Remove</button>
                    </td>
                </tr>
                } @empty {
                <tr>
                    <td colspan="4">No availability slots registered.</td>
                </tr>
                }
            </tbody>
        </table>
    </div>
</div>
