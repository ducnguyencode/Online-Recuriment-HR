<div class="max-w-4xl mx-auto p-4 py-8 animate-in fade-in duration-500">
  <div class="bg-white border border-slate-200 rounded-[24px] p-8 shadow-sm">

    <div class="flex items-center justify-between mb-8 pb-6 border-b border-slate-100">
      <div>
        <h2 class="text-2xl font-bold text-slate-900">Edit Profile</h2>
        <p class="text-sm text-slate-500 mt-1">Update your personal information and resume details.</p>
      </div>
      <div
        class="h-16 w-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-xl font-bold uppercase">
        {{ authService.currentUser()?.fullName?.charAt(0)}}
      </div>
    </div>

    @if (successMessage()) {
    <div
      class="mb-6 p-4 bg-green-50 border border-green-100 text-green-700 rounded-xl text-sm font-bold flex items-center gap-2">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
      </svg>
      {{ successMessage() }}
    </div>
    }

    <div class="space-y-6">
      <div class="grid grid-cols-1 gap-6">
        <div>
          <label class="block text-[11px] font-bold text-slate-700 uppercase tracking-widest mb-2 ml-1">Full
            Name</label>
          <input type="text" [(ngModel)]="updateForm.fullName" name="fullName"
            class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
        </div>
        <!-- <div>
          <label class="block text-[11px] font-bold text-slate-700 uppercase tracking-widest mb-2 ml-1">Job Title</label>
          <input type="text" [(ngModel)]="updateForm.title" name="title" placeholder="e.g. Frontend Developer"
            class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
        </div> -->
        <div>
          <label class="block text-[11px] font-bold text-slate-700 uppercase tracking-widest mb-2 ml-1">Email
            Address</label>
          <input type="email" [(ngModel)]="updateForm.email" name="email" readonly disabled
            class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
        </div>
        <div>
          <label class="block text-[11px] font-bold text-slate-700 uppercase tracking-widest mb-2 ml-1">Phone
            Number</label>
          <input type="text" [(ngModel)]="updateForm.phone" name="phone"
            class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
        </div>
      </div>

      <!-- <div>
        <label class="block text-[11px] font-bold text-slate-700 uppercase tracking-widest mb-2 ml-1">Location / Address</label>
        <input type="text" [(ngModel)]="candidate.address" name="address" placeholder="Ho Chi Minh City, Vietnam"
          class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
      </div>

      <div>
        <label class="block text-[11px] font-bold text-slate-700 uppercase tracking-widest mb-2 ml-1">About Me (Bio)</label>
        <textarea [(ngModel)]="candidate.bio" name="bio" rows="4" placeholder="Briefly describe your skills and experience..."
          class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none transition-all resize-none"></textarea>
      </div> -->

      <div class="flex justify-end pt-4 border-t border-slate-100">
        <button type="submit" (click)="submitUpdateForm()"
          class="px-8 py-4 bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold rounded-2xl transition-all shadow-lg shadow-blue-500/30">
          Save Changes
        </button>
      </div>
    </div>
  </div>
</div>
