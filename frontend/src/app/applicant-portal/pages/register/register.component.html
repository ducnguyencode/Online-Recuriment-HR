<div class="applicant-login-page">
  <div class="applicant-card">

    @if (!isRegistered) {
      <!-- Register form -->
      <div class="form-header" style="text-align: center;">
        <img src="logo-hr-portal.svg" alt="HR Recruitment Logo" class="applicant-logo" />
        <h2 class="form-title">Create Account</h2>
        <p class="form-desc">Join us to find your dream job today.</p>
      </div>

      @if (errorMessage) {
        <div class="alert alert-danger">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/>
          </svg>
          <span>{{ errorMessage }}</span>
        </div>
      }

      <form class="form-body" (ngSubmit)="onSubmit()">
        <div class="field">
          <label class="field-label">Full Name</label>
          <input type="text" [(ngModel)]="form.fullName" name="fullName" required
            class="field-input" placeholder="John Doe" />
        </div>

        <div class="field">
          <label class="field-label">Email Address</label>
          <input type="email" [(ngModel)]="form.email" name="email" required
            class="field-input" placeholder="name@company.com" />
        </div>

        <div class="field">
          <label class="field-label">Phone Number <span style="font-weight: 400; color: #94a3b8; font-size: 10px;">(optional)</span></label>
          <input type="tel" [(ngModel)]="form.phone" name="phone"
            class="field-input" placeholder="+84 123 456 789" />
        </div>

        <div class="field">
          <label class="field-label">Password</label>
          <div class="field-input-wrap">
            <input
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="form.password" name="password" required
              class="field-input field-input--has-icon" placeholder="••••••••" />
            <button type="button" class="field-icon-btn" (click)="togglePasswordVisibility()" tabindex="-1">
              @if (showPassword) {
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              } @else {
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              }
            </button>
          </div>
          <div>
            <label class="block text-[11px] font-bold text-slate-700 uppercase tracking-widest mb-2 ml-1">Confirm Password</label>
            <input type="password" [(ngModel)]="form.confirmPassword" name="confirmPassword" required
              class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none transition-all" placeholder="••••••••">
          </div>
        </div>

        <div class="field">
          <label class="field-label">Confirm Password</label>
          <div class="field-input-wrap">
            <input
              [type]="showConfirmPassword ? 'text' : 'password'"
              [(ngModel)]="form.confirmPassword" name="confirmPassword" required
              class="field-input field-input--has-icon" placeholder="••••••••" />
            <button type="button" class="field-icon-btn" (click)="toggleConfirmPasswordVisibility()" tabindex="-1">
              @if (showConfirmPassword) {
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              } @else {
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              }
            </button>
          </div>
        </div>

        <button type="submit" [disabled]="isLoading" class="btn-submit">
          @if (isLoading) {
            <span class="spinner"></span>
            Creating account...
          } @else {
            Sign up
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
            </svg>
          }
        </button>
      </form>

      <div class="form-footer">
        <span class="footer-text">Already have an account? <a routerLink="/login" class="field-link">Sign in</a></span>
      </div>
    } @else {
      <!-- Success state -->
      <div class="form-header" style="text-align: center;">
        <div class="step-icon" style="background: #ecfdf3; color: #0f9f6e; margin: 0 auto 16px;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 13l4 4L19 7"/>
          </svg>
        </div>
        <h2 class="form-title">Registration Successful!</h2>
        <p class="form-desc">
          {{ successMessage }}
          @if (submittedEmail) {
            <span style="display: block; margin-top: 4px; font-weight: 600; color: #0f172a;">{{ submittedEmail }}</span>
          }
        </p>
      </div>
      <button (click)="returnLogin()" class="btn-submit" style="background: #f1f5f9; color: #0f172a; box-shadow: none;">
        Return to Login
      </button>
    }
  </div>
</div>
