<div class="min-h-screen bg-slate-50 flex items-center justify-center p-4 font-sans relative overflow-hidden">

  <div class="absolute top-[-10%] left-[-5%] w-96 h-96 bg-blue-200 rounded-full mix-blend-multiply filter blur-3xl opacity-40"></div>
  <div class="absolute bottom-[-10%] right-[-5%] w-96 h-96 bg-indigo-200 rounded-full mix-blend-multiply filter blur-3xl opacity-40"></div>

  <div class="w-full max-w-md bg-white rounded-[32px] shadow-2xl shadow-slate-200/50 border border-slate-100 p-10 relative z-10 animate-in slide-in-from-bottom-4 fade-in duration-500">

    <div class="flex flex-col items-center mb-8">
      <div class="w-14 h-14 bg-gradient-to-br from-blue-500 to-blue-700 text-white flex items-center justify-center font-bold text-2xl rounded-2xl shadow-lg shadow-blue-200 mb-5">
        HR
      </div>
      <h2 class="text-[28px] font-extrabold text-slate-900 tracking-tight leading-tight">Reset Password</h2>
      <p class="text-sm text-slate-500 font-medium mt-2 text-center px-2">Enter your email address and we'll send you a link to reset your password.</p>
    </div>

    <form class="space-y-4">
      <div>
        <label class="block text-[11px] font-bold text-slate-700 uppercase tracking-widest mb-2 ml-1">Email Address</label>
        <input type="email" class="w-full px-5 py-4 rounded-2xl border border-slate-200 hover:border-slate-300 bg-slate-50/50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-sm font-medium placeholder:text-slate-400" placeholder="student@university.edu">
      </div>

      <button type="button" class="w-full mt-6 py-4 px-8 border border-transparent rounded-2xl shadow-lg shadow-slate-900/10 text-sm font-bold text-white bg-slate-900 hover:bg-blue-600 transition-all duration-300">
        Send Reset Link
      </button>
    </form>

    <div class="mt-8 pt-6 border-t border-slate-100 text-center">
      <a routerLink="/login" class="inline-flex items-center text-sm font-bold text-slate-900 hover:text-blue-600 transition-colors group">
        <svg class="w-4 h-4 mr-2 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Back to Login
      </a>
    </div>

  </div>
</div>
