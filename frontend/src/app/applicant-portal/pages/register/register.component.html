<div class="min-h-screen bg-slate-50 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 font-sans">
  <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-[32px] shadow-sm border border-slate-100">
    <div class="text-center">
      <h2 class="text-3xl font-extrabold text-slate-900">Create <span class="text-blue-600">Account</span></h2>
      <p class="mt-2 text-sm text-slate-500 font-medium">Join us to find your dream job today.</p>
    </div>

    @if (errorMessage) {
      <div class="bg-red-50 border border-red-100 text-red-600 px-4 py-3 rounded-2xl text-sm font-bold">
        {{ errorMessage }}
      </div>
    }

    <form class="mt-8 space-y-6" (ngSubmit)="onSubmit()">
      <div class="space-y-4">
        <div>
          <label class="block text-[11px] font-bold text-slate-700 uppercase tracking-widest mb-2 ml-1">Full Name</label>
          <input type="text" [(ngModel)]="form.fullName" name="fullName" required
            class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none transition-all" placeholder="John Doe">
        </div>
        <div>
          <label class="block text-[11px] font-bold text-slate-700 uppercase tracking-widest mb-2 ml-1">Email Address</label>
          <input type="email" [(ngModel)]="form.email" name="email" required
            class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none transition-all" placeholder="name@company.com">
        </div>
        <div>
          <label class="block text-[11px] font-bold text-slate-700 uppercase tracking-widest mb-2 ml-1">Password</label>
          <input type="password" [(ngModel)]="form.password" name="password" required
            class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none transition-all" placeholder="••••••••">
        </div>
      </div>

      <button type="submit" [disabled]="isLoading"
        class="w-full flex justify-center py-4 px-4 border border-transparent rounded-2xl shadow-lg text-sm font-bold text-white bg-slate-900 hover:bg-blue-600 focus:outline-none transition-all duration-300 disabled:opacity-50">
        {{ isLoading ? 'Creating account...' : 'Sign up' }}
      </button>

      <div class="text-center mt-4">
        <p class="text-sm text-slate-500">Already have an account?
          <a routerLink="/login" class="font-bold text-blue-600 hover:text-blue-700 transition">Sign in</a>
        </p>
      </div>
    </form>
  </div>
</div>
