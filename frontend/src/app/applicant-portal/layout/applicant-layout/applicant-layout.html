<div class="min-h-screen bg-slate-50 font-sans flex flex-col">
  <!-- HEADER – ẩn khi là forgot-password HR để full màn hình như /hr/login -->
  @if (!isHrForgotPassword) {
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm px-8 h-16 flex justify-between items-center">
      <div class="flex items-center gap-3 cursor-pointer" routerLink="/careers">
        <img src="logo-hr-portal.svg" alt="HR Portal" class="w-9 h-9 drop-shadow-sm">
        <div class="flex flex-col leading-tight">
          <span class="text-sm font-black uppercase tracking-tighter text-slate-900">Recruitment</span>
          <span class="text-[10px] text-blue-500 font-bold uppercase">Online Portal</span>
        </div>
      </div>

      <div class="flex items-center gap-4">
        @if (isLoggedIn()) {
          <!-- HIỆN PROFILE KHI ĐÃ LOGGED IN -->
          <div class="group relative">
            <div class="flex items-center gap-3 bg-slate-50 p-1.5 pr-4 rounded-full border border-slate-200 cursor-pointer hover:bg-white hover:border-blue-300 transition-all">
              <div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-white font-bold text-[10px]">
                {{ userName().charAt(0) }}
              </div>
              <span class="text-xs font-black text-slate-700 uppercase italic">{{ userName() }}</span>
              <svg class="w-4 h-4 text-slate-400 group-hover:rotate-180 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
              </svg>
            </div>

            <div class="absolute right-0 mt-2 w-56 bg-white border border-slate-200 rounded-2xl shadow-xl py-2 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-50">
              <a routerLink="/applicant" class="flex items-center gap-3 px-4 py-3 text-xs font-bold text-slate-600 hover:bg-blue-50">Dashboard</a>
              <a routerLink="/profile" class="flex items-center gap-3 px-4 py-3 text-xs font-bold text-slate-600 hover:bg-blue-50">Profile</a>
              <div class="border-t border-slate-100 my-1"></div>
              <button (click)="logout()" class="w-full text-left px-4 py-3 text-xs font-bold text-red-600 hover:bg-red-50 uppercase italic italic">Sign Out</button>
            </div>
          </div>
        } @else {
          <!-- HIỆN NÚT SIGN IN KHI CHƯA LOGGED IN (ĐỂ ĐI ĐẾN TRANG LOGIN) -->
          <button routerLink="/login" class="px-6 py-2 bg-slate-900 text-white text-xs font-black rounded-xl hover:bg-blue-600 transition-all shadow-md uppercase italic tracking-widest">
            Sign In
          </button>
        }
      </div>
    </header>
  }

  <main class="flex-grow relative">
    <router-outlet></router-outlet>
  </main>
</div>
