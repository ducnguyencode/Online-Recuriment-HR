<div class="min-h-screen bg-slate-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8 font-sans">
  <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
    <img src="logo-hr-portal.svg" alt="HR Portal" class="w-16 h-16 mx-auto mb-4 drop-shadow-md hover:scale-105 transition-transform duration-300">
    <h2 class="text-3xl font-extrabold text-slate-900">Create Account</h2>
    <p class="mt-2 text-sm text-slate-500 font-medium">Join us to find your dream job today</p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-8 shadow-xl shadow-slate-200/50 rounded-[24px] border border-slate-200">

      <form class="space-y-5" (ngSubmit)="onSubmit()">
        <div>
          <label class="block text-[11px] font-bold text-slate-700 uppercase tracking-widest mb-2 ml-1">Full Name</label>
          <input type="text" [(ngModel)]="registerForm.fullName" name="fullName" required class="w-full px-4 py-3.5 rounded-xl border border-slate-200 bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none transition-all text-sm font-medium" placeholder="John Doe">
        </div>

        <div>
          <label class="block text-[11px] font-bold text-slate-700 uppercase tracking-widest mb-2 ml-1">Email Address</label>
          <input type="email" [(ngModel)]="registerForm.email" name="email" required class="w-full px-4 py-3.5 rounded-xl border border-slate-200 bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none transition-all text-sm font-medium" placeholder="applicant@example.com">
        </div>

        <div class="relative">
          <label class="block text-[11px] font-bold text-slate-700 uppercase tracking-widest mb-2 ml-1">Password</label>
          <input [type]="showPassword() ? 'text' : 'password'" [(ngModel)]="registerForm.password" name="password" required class="w-full pl-4 pr-14 py-3.5 rounded-xl border border-slate-200 bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none transition-all text-sm font-medium" placeholder="••••••••">

          <button type="button" (click)="showPassword.set(!showPassword())" class="absolute bottom-2 right-2 w-10 h-10 rounded-xl border border-slate-100 bg-white flex items-center justify-center text-slate-400 hover:text-blue-600 hover:border-blue-100 transition-all shadow-sm">
            @if (showPassword()) { <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg> }
            @else { <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg> }
          </button>
        </div>

        <div>
          <button type="submit" [disabled]="isLoading()" class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-md text-sm font-bold text-white bg-slate-900 hover:bg-blue-600 focus:outline-none transition-all disabled:opacity-50">
            {{ isLoading() ? 'Creating account...' : 'Create Account' }}
          </button>
        </div>
      </form>

      <div class="mt-8 text-center"><p class="text-sm font-medium text-slate-500">Already have an account? <a routerLink="/login" class="font-bold text-blue-600 hover:text-blue-500 transition-colors">Sign in</a></p></div>
    </div>
  </div>
</div>
