<div class="min-h-screen bg-slate-50 font-sans flex flex-col">
  <header
    class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm"
  >
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <div
          class="flex items-center gap-3 cursor-pointer"
          routerLink="/careers"
        >
          <div
            class="w-9 h-9 bg-blue-600 text-white rounded-[10px] flex items-center justify-center font-black shadow-md"
          >
            HR
          </div>
          <span class="text-xl font-bold text-slate-900 tracking-tight"
            >Recruitment</span
          >
        </div>

        <nav class="hidden md:flex space-x-8 h-full">
          <a
            routerLink="/careers"
            routerLinkActive="text-blue-600 font-bold border-b-2 border-blue-600"
            [routerLinkActiveOptions]="{exact: true}"
            class="text-slate-500 hover:text-slate-900 px-1 flex items-center text-sm font-medium transition-colors border-b-2 border-transparent"
          >
            Careers
          </a>

          @if (auth.isLoggedIn()) {
          <a
            routerLink="/applicant"
            routerLinkActive="text-blue-600 font-bold border-b-2 border-blue-600"
            class="text-slate-500 hover:text-slate-900 px-1 flex items-center text-sm font-medium transition-colors border-b-2 border-transparent"
          >
            Dashboard
          </a>
          }
        </nav>

        <div class="flex items-center gap-4">
          <span
            class="hidden text-[10px] font-bold text-slate-400 uppercase tracking-widest md:block"
            >For Applicants</span
          >

          @if (!auth.isLoggedIn()) {
          <button
            routerLink="/login"
            class="px-6 py-2.5 bg-slate-900 hover:bg-blue-600 text-white text-sm font-bold rounded-xl transition-all shadow-md"
          >
            Sign In
          </button>
          } @else {
          <div class="flex items-center gap-2 border-l border-slate-200 pl-4">
            <a
              routerLink="/profile"
              routerLinkActive="bg-slate-50 text-blue-600 border-slate-200 shadow-sm"
              class="flex items-center gap-2 hover:bg-slate-50 px-3 py-2 rounded-xl transition cursor-pointer border border-transparent"
            >
              <div
                class="w-8 h-8 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold text-sm uppercase"
              >
                {{ auth.currentUser()?.fullName!.charAt(0) }}
              </div>
              <span class="text-sm font-bold text-slate-700 hidden sm:block"
                >{{ auth.currentUser()?.fullName! }}</span
              >
            </a>

            <button
              (click)="logout()"
              class="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all"
              title="Sign Out"
            >
              <svg
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
                ></path>
              </svg>
            </button>
          </div>
          }
        </div>
      </div>
    </div>
  </header>

  <main class="flex-1 w-full relative">
    <router-outlet></router-outlet>
  </main>
</div>
